# Fuente
font_family      JetBrains Mono
font_size        10.0

# Transparencia
background_opacity 0.95

# Sin decoraciones
hide_window_decorations no

# Colores (tema oscuro)
background #1a1a1a
foreground #d4d4d4

# Sin barra de título
wayland_titlebar_color background

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Rendimiento
repaint_delay 8
input_delay 2
sync_to_monitor yes

# Sin campana
enable_audio_bell no
